trainer:
  max_epochs: 50
  accelerator: auto
  devices: 1
  default_root_dir: /tmp/script
run: fit

model:
  backbone_name: dinov3_vits16plus
  backbone_repo: facebookresearch/dinov3
  backbone_source: github
  backbone_weights: /mnt/gsdata/projects/other/salim_playground_directory/9_orthoaoi/OrthoAOI/models/dinov3_vits16plus_pretrain_lvd1689m-4057cbaa.pth
  models_dir: models
  lr_head: 1e-3
  lr_backbone: 1e-4
  weight_decay: 1e-4
  freeze_epochs: 5
  threshold: 0.5

data:
  train_images: data/splits/train.csv
  train_masks: null
  val_images: data/splits/val.csv
  val_masks: null
  predict_images: null
  tile_size: 1024
  batch_size: 8
  num_workers: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  io_retries: 3
  io_retry_delay: 0.1
  io_resample_on_error: true
  io_resample_limit: 10
  skip_missing_pairs: true

predict:
  checkpoint_path: path/to/checkpoint.ckpt
  output_dir: predictions
