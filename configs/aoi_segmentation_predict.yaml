trainer:
  accelerator: auto
  devices: 1
  default_root_dir: /tmp/script

run: predict

data:
  train_images: null
  train_masks: null
  val_images: null
  val_masks: null
  predict_images: path/to/predict/images
  tile_size: 512
  batch_size: 8
  num_workers: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  io_retries: 3
  io_retry_delay: 0.1
  io_resample_on_error: true
  io_resample_limit: 10
  skip_missing_pairs: true

predict:
  checkpoint_path: path/to/checkpoint.ckpt
  output_dir: predictions
